name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BACKEND_IMAGE: mayowales/devopsexpensy-backend-1
  FRONTEND_IMAGE: mayowales/devopsexpensy-frontend-1
  NAMESPACE: wale-expensy-ns
  NEXT_PUBLIC_API_URL: https://wale-expensy-safe.duckdns.org

jobs:
  # STAGE 1: BUILD
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- Backend ---
      - name: Setup Node.js for backend
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        working-directory: ./expensy_backend
        run: npm ci

      - name: Build backend
        working-directory: ./expensy_backend
        run: npm run build

      # --- Frontend ---
      - name: Install frontend dependencies
        working-directory: ./expensy_frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./expensy_frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ env.NEXT_PUBLIC_API_URL }}
        run: npm run build

  # STAGE 2: TEST
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build  # to run if build succeeds

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # --- Backend tests ---
      - name: Install backend dependencies
        working-directory: ./expensy_backend
        run: npm ci

      - name: Run backend tests
        working-directory: ./expensy_backend
        # Using "echo" since there are no real tests yet.
        run: echo "No backend tests yet — skipping"

      # --- Frontend tests ---
      - name: Install frontend dependencies
        working-directory: ./expensy_frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: ./expensy_frontend
        run: echo "No frontend tests yet — skipping"

  # STAGE 3: DOCKER BUILD & PUSH
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test  # Only run if tests pass
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Docker Hub login using secrets you configured
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # --- Build & push backend ---
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./expensy_backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest

      # --- Build & push frontend ---
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./expensy_frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest

  # STAGE 4: DEPLOY TO AKS
  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: docker  # Only run after images are pushed
    environment: production  # Requires manual approval

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up kubectl with your cluster credentials
      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      # Update the backend image to the new version
      # then record saves the command in the rollout history
      - name: Deploy backend
        run: |
          kubectl set image deployment/backend \
            backend=${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/backend \
            -n ${{ env.NAMESPACE }} \
            --timeout=120s

      # Update the frontend image to the new version
      - name: Deploy frontend
        run: |
          kubectl set image deployment/frontend \
            frontend=${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/frontend \
            -n ${{ env.NAMESPACE }} \
            --timeout=120s

      # Verify everything is running
      - name: Verify deployment
        run: |
          echo "=== Pods ==="
          kubectl get pods -n ${{ env.NAMESPACE }}
          echo ""
          echo "=== Services ==="
          kubectl get svc -n ${{ env.NAMESPACE }}
          echo ""
          echo "=== Ingress ==="
          kubectl get ingress -n ${{ env.NAMESPACE }}

